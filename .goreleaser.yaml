---
version: 2
project_name: cloudflare-operator
builds:
  - id: manager
    main: ./cmd/main.go
    binary: manager
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{ .Tag }}
dockers_v2:
  - images:
      - ghcr.io/containeroo/cloudflare-operator
      - containeroo/cloudflare-operator
    tags:
      - "{{ .Tag }}"
      - latest
    dockerfile: Dockerfile.goreleaser
    ids:
      - manager
    platforms:
      - linux/amd64
      - linux/arm64
    flags:
      - --pull
      - --cache-from=type=gha,scope=cloudflare-operator
      - --cache-to=type=gha,mode=max,scope=cloudflare-operator
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "{{ .ProjectName }}"
      org.opencontainers.image.url: https://github.com/containeroo/cloudflare-operator
      org.opencontainers.image.source: https://github.com/containeroo/cloudflare-operator
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.created: '{{ time "2006-01-02T15:04:05Z07:00" }}'
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: GNU General Public License v3.0
release:
  extra_files:
    - glob: ./crds.yaml
  prerelease: auto
